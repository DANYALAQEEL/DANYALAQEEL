name: Chess
on: [push, issue_comment]
permissions: {contents: write, issues: write}
jobs: {run: {runs-on: ubuntu-latest, steps: [{"uses": "actions/checkout@v3"}, {"run": "git clone https://github.com/marcizhu/readme-chess.git e"}, {"run": "cp -r e/src e/data e/games e/img e/main.py e/requirements.txt ."}, {"run": "pip install -r requirements.txt && python main.py", "env": {"GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}"}}, {"run": "git config user.name bot && git config user.email bot@bot.com && git add . && git commit -m move || true && git push"}]}}
