name: Chess

on:
  push:
      branches:
            - main
              schedule:
                  - cron: "0 * * * *"
                    issue_comment:
                        types: [created]

                        permissions:
                          contents: write
                            issues: write

                            jobs:
                              update-chess-board:
                                  runs-on: ubuntu-latest
                                      steps:
                                            - name: Checkout code
                                                    uses: actions/checkout@v3

                                                          - name: Set up Python
                                                                  uses: actions/setup-python@v4
                                                                          with:
                                                                                    python-version: '3.10'

                                                                                          - name: Clone Chess Engine
                                                                                                  run: |
                                                                                                            git clone https://github.com/marcizhu/readme-chess.git engine
                                                                                                                      cp -r engine/src .
                                                                                                                                cp -r engine/data .
                                                                                                                                          cp -r engine/games .
                                                                                                                                                    cp -r engine/img .
                                                                                                                                                              cp engine/main.py .
                                                                                                                                                                        cp engine/requirements.txt .
                                                                                                                                                                        
                                                                                                                                                                              - name: Install dependencies
                                                                                                                                                                                      run: |
                                                                                                                                                                                                python -m pip install --upgrade pip
                                                                                                                                                                                                          pip install -r requirements.txt
                                                                                                                                                                                                          
                                                                                                                                                                                                                - name: Run Chess Engine
                                                                                                                                                                                                                        run: python main.py
                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                - name: Commit and Push
                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                  git config --global user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                            git config --global user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                      git add .
                                                                                                                                                                                                                                                                                                git commit -m "Update chess board" || echo "No changes to commit"
                                                                                                                                                                                                                                                                                                          git push
                                                                                                                                                                                                                                                                                                          
