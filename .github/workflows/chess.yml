name: Chess
on:
  push:
      branches: [ main ]
        issue_comment:
            types: [created]

            permissions:
              contents: write
                issues: write

                jobs:
                  run:
                      runs-on: ubuntu-latest
                          if: github.event_name == 'push' || contains(github.event.comment.body, 'Chess') || (github.event.issue && contains(github.event.issue.title, 'Chess'))
                              steps:
                                    - uses: actions/checkout@v3
                                          - name: Setup Python
                                                  uses: actions/setup-python@v4
                                                          with:
                                                                    python-version: '3.x'
                                                                          - name: Run chess bot
                                                                                  env:
                                                                                            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                    run: |
                                                                                                              git clone https://github.com/marcizhu/readme-chess.git e
                                                                                                                        cp -r e/src e/data e/games e/img e/main.py e/requirements.txt .
                                                                                                                                  pip install -r requirements.txt
                                                                                                                                            python main.py
                                                                                                                                                  - name: Commit and push changes
                                                                                                                                                          run: |
                                                                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                        git add .
                                                                                                                                                                                                  git commit -m "Chess move" || exit 0
                                                                                                                                                                                                            git push
                                                                                                                                                                                                            
