name: Playable Readme Chess

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-chess-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Chess Engine
        uses: marcizhu/readme-chess@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_DIR: ./
