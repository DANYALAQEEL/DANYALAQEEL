name: Chess
on: [push, issue_comment, issues]
permissions: {contents: write, issues: write}
jobs:
  run:
      runs-on: ubuntu-latest
          steps:
                - uses: actions/checkout@v3
                      - uses: actions/setup-python@v4
                              with: {python-version: '3.x'}
                                    - env: {GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'}
                                            run: git clone https://github.com/marcizhu/readme-chess.git e && cp -r e/src e/data e/games e/img e/main.py e/requirements.txt . && pip install -r requirements.txt && python main.py && git config user.name bot && git config user.email bot@bot.com && git add . && (git commit -m move || exit 0) && git push
                                            
