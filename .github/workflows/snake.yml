name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Neon Cyber-Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#10B981&color_dots=#0a0a0a,#064e3b,#047857,#059669,#10B981
            
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          author: Danyal Aqeel <raqeel.bese24seecs@seecs.edu.pk>
          committer: Danyal Aqeel <raqeel.bese24seecs@seecs.edu.pk>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
