name: Generate 3D GitHub Profile City

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name "DANYALAQEEL"
          git config user.email "raqeel.bese24seecs@seecs.edu.pk"
          git add -A .
          git commit -m "Auto-generated 3D contribution graph" || true
          git push
